name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.3.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: bash scripts/package-release.sh "${{ matrix.target }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/loopsmith-v*.tar.gz
            dist/loopsmith-v*.zip
            dist/loopsmith-v*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="${REF_NAME}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          fi

          cd dist-artifacts
          sha256sum loopsmith-v*.tar.gz loopsmith-v*.zip > checksums.txt
          cd ..

          cat > release-notes.md <<EOF
          ## Loopsmith ${tag}

          Loopsmith：把 AI 修复锻造成可验证结果的本地 CLI。

          ### Install with GitHub CLI

          Private repositories require an authenticated GitHub CLI session:

          \`\`\`bash
          gh auth login
          gh release download ${tag} -R ${REPOSITORY} -p 'loopsmith-${tag}-<target>.*'
          \`\`\`

          Replace \`<target>\` with one of:

          - \`x86_64-unknown-linux-gnu\`
          - \`x86_64-apple-darwin\`
          - \`aarch64-apple-darwin\`
          - \`x86_64-pc-windows-msvc\`

          ### Verify checksum

          \`\`\`bash
          shasum -a 256 -c checksums.txt
          \`\`\`

          ### Run

          \`\`\`bash
          loopsmith doctor
          loopsmith profiles
          loopsmith run --config examples/plaintext-loop.json
          loopsmith inspect
          loopsmith diff
          loopsmith apply --dry-run
          \`\`\`
          EOF

          if gh release view "${tag}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" --repo "${REPOSITORY}" --notes-file release-notes.md
            gh release upload "${tag}" dist-artifacts/* --repo "${REPOSITORY}" --clobber
          else
            gh release create "${tag}" dist-artifacts/* \
              --repo "${REPOSITORY}" \
              --title "Loopsmith ${tag}" \
              --notes-file release-notes.md
          fi
