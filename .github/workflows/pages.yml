name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "assets/logo.png"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install ImageMagick
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .pages
          mkdir -p .pages/assets
          cp site/index.html .pages/index.html

          if command -v magick >/dev/null 2>&1; then
            magick assets/logo.png -trim +repage -resize 160x160 -strip .pages/assets/logo.png
          elif command -v convert >/dev/null 2>&1; then
            convert assets/logo.png -trim +repage -resize 160x160 -strip .pages/assets/logo.png
          else
            echo "ImageMagick is required to prepare the web logo." >&2
            exit 1
          fi

          file .pages/assets/logo.png
          wc -c .pages/assets/logo.png

          python3 - <<'PY'
          from pathlib import Path

          page = Path(".pages/index.html")
          text = page.read_text()
          page.write_text(text.replace("../assets/logo.png", "assets/logo.png"))
          PY

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
